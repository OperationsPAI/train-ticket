{{- $root := . }}
{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    app: {{ $svc.name }}
spec:
  {{- if not $root.Values.autoscaling.enabled }}
  replicas: {{ $svc.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      {{- /* 根据监控类型和语言，条件性地注入 initContainers */}}
      {{- if and (not $svc.lang) (eq $root.Values.global.monitoring "opentelemetry") (eq $root.Values.opentelemetry.enabled true) }}
      initContainers:
        - name: init-otel-agent
          image: "{{ $root.Values.global.image.repository }}/{{ $root.Values.opentelemetry.image }}"
          command: ['sh', '-c', 'cp -r /javaagent.jar /otel-agent/otel-agent.jar']
          volumeMounts:
            - name: otel-agent
              mountPath: /otel-agent
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: "{{ $root.Values.global.image.repository }}/{{ $svc.name }}:{{ $root.Values.global.image.tag | default $root.Chart.AppVersion }}"
          {{- with $root.Values.global.image.pullPolicy }}
          imagePullPolicy: {{ . }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ $svc.secretRef | quote}}
          resources:
            {{- if $svc.resources }}
            {{- toYaml $svc.resources | nindent 12 }}
            {{- else }}
            {{- toYaml $root.Values.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
            - name: timezone
              mountPath: /etc/timezone
              readOnly: true
            {{- if and (not $svc.lang) (eq $root.Values.global.monitoring "opentelemetry") (eq $root.Values.opentelemetry.enabled true) }}
            - name: otel-agent
              mountPath: /otel-agent
            {{- end }}
          {{- with $root.Values.global.monitoring }}
            {{- if eq $svc.lang "python" }}
          env:
            - name: OTEL_TRACES_EXPORTER
              value: console,otlp
            - name: OTEL_METRICS_EXPORTER
              value: console,otlp
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $svc.name }},service.namespace={{ $root.Release.Namespace }},pod.name=$(POD_NAME)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            {{- end }}
            {{- if eq $svc.lang "frontend" }}
          env:
            - name: OTEL_TRACES_EXPORTER
              value: console,otlp
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $svc.name }},service.namespace={{ $root.Release.Namespace }},pod.name=$(POD_NAME)"
            - name: OTEL_METRICS_EXPORTER
              value: console,otlp
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            {{- end }}
            {{- if eq $svc.lang "javascript" }}
          env:
            - name: OTEL_TRACES_EXPORTER
              value: console,otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $svc.name }},service.namespace={{ $root.Release.Namespace }}"
            - name: OTEL_METRICS_EXPORTER
              value: console,otlp
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            - name: OTEL_NODE_RESOURCE_DETECTORS
              value: "env,host,os"
            - name: NODE_OPTIONS
              value: "--require @opentelemetry/auto-instrumentations-node/register"
            {{- end }}
            {{- if not $svc.lang }} # 默认语言为java
              {{- if and (eq $root.Values.global.monitoring "opentelemetry") (eq $root.Values.opentelemetry.enabled true) }}
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $svc.name }},service.namespace={{ $root.Release.Namespace }},pod.name=$(POD_NAME)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
              value: {{ $root.Values.global.otelcollector | default "http://$(NODE_IP):4317" | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_SPAN_INSECURE
              value: "true"
            {{- if $root.Values.global.otelcollector }}
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel-agent/otel-agent.jar -Dotel.instrumentation.common.experimental.controller-telemetry.enabled=true -Xmx2048m"
            {{- else }}
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel-agent/otel-agent.jar -Dotel.instrumentation.common.experimental.controller-telemetry.enabled=true -Xmx2048m -Xms2048m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=35 -XX:G1ReservePercent=15 -XX:+ParallelRefProcEnabled -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof -XX:NativeMemoryTracking=summary -XX:+DisableExplicitGC"
            {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
      volumes:
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
        - name: timezone
          hostPath:
            path: /etc/timezone
            type: File
        {{- if and (not $svc.lang) (eq $root.Values.global.monitoring "opentelemetry") (eq $root.Values.opentelemetry.enabled true) }}
        - name: otel-agent
          emptyDir: {}
        {{- end }}
---
{{- end }}